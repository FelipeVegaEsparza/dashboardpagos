server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # ============================================
    # API AND UPLOADS - Must be before location /
    # ============================================
    
    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://api:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy uploads to the backend service
    # This ensures uploaded files are served from the API container
    location /uploads/ {
        proxy_pass http://api:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache uploaded images for better performance
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
    }

    # ============================================
    # STATIC ASSETS
    # ============================================
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ============================================
    # SPA FALLBACK - Must be last
    # ============================================
    
    # Serve static files - explicit check for file existence
    location / {
        try_files $uri $uri/ /index.html;
    }
}
